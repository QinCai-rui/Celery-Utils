# Essentials Module Configuration
# Includes killall controls, tempban, kickall, and server MOTD.

# NOTE: BUMP VERSION WHEN MAKING CHANGES TO THIS FILE
# SERVER ADMIN: do not touch
config-version: 7

killall:
  # Set to false to disable /killall command handling.
  enabled: true

  # Permission required to use /killall.
  command-permission: "celeryutils.killall"

  # If false, named living entities (custom-name mobs) are protected from /killall.
  include-named-entities: false

tempban:
  # Set to false to disable /tempban command handling.
  enabled: true

  # Permission required to use /tempban.
  command-permission: "celeryutils.tempban"

kickall:
  # Set to false to disable /kickall command handling.
  enabled: true

  # Permission required to use /kickall.
  command-permission: "celeryutils.kickall"

  # Message broadcast before kicking (supports MiniMessage).
  broadcast-message: "<red>Server is kicking all players. Rejoin shortly.</red>"

  # If true, OPs are also kicked by /kickall.
  include-operators: false

motd:
  # Set to true to enable custom server MOTD (multiplayer server list).
  enabled: true

  # List of MOTD entries. Place them in a separate YAML file (see messages-file below).
  # Each entry uses YAML block scalar (|-) for multi-line MOTDs.
  # Supports both legacy (&) and MiniMessage formatting.
  # If multiple entries are given, rotation can cycle through them.
  #
  # Example motds.yml:
  #   messages:
  #     - |-
  #       &aServer Name &e1.0
  #       &7Your MOTD line 2 here
  #     - |-
  #       &aServer Name &e1.0
  #       &7Another MOTD line 2
  #
  # If the file does not exist the MOTD will remain unchanged.

  # Path to the MOTD file (relative to plugins/CeleryUtils/modules/essentials/).
  messages-file: "motds.yml"

  # How often (in seconds) to rotate to the next MOTD message.
  # Set to 0 to disable rotation (uses the first message if there are multiple present).
  rotation-interval-seconds: 10

  # Rotation mode: SEQUENTIAL or RANDOM.
  rotation-mode: SEQUENTIAL

tips:
  # Set to false to disable the /tips command.
  enabled: true

  # File containing the tip entries (relative to modules/essentials/).
  tips-file: "tips.yml"

  # Permission required to use /tips. Leave blank for no permission requirement.
  command-permission: "celeryutils.tips"

  # Number of tips displayed per page.
  per-page: 5

  # Title shown at the top of the tips list. Supports MiniMessage.
  title: "<gold><bold>Tips</bold></gold>"

messages:
  no-permission: "&cYou do not have permission to use this command."
  killall-disabled: "&cKillall command is disabled."
  killall-usage: "&cUsage: /killall <selector|entity_type> [world]"
  killall-unknown-target: "&cUnknown killall target: &f%target%"
  killall-unknown-world: "&cUnknown world: &f%world%"
  killall-result: "&aRemoved &f%count% &aentities for target &f%target%&a."
  tempban-usage: "<red>Usage:</red> <white>/tempban <player> <duration> [reason]</white>\n<gray>Duration: 10m, 2h30m, 1d, 1w6h, or bare number = minutes</gray>"
  tempban-banned: "<yellow>You have been tempbanned by <white>%sender%</white> for <white>%duration%</white>.\n<yellow>Reason:</yellow> <white>%reason%</white>"
  tempban-success: "<green>Tempbanned <white>%player%</white> for <white>%duration%</white>.</green>"
  tempban-invalid-player: "&cPlayer &f%player% &cnot found."
  tempban-invalid-duration: "&cInvalid duration: &f%input%"
  kickall-usage: "<red>Usage:</red> <white>/kickall [reason]</white>"
  kickall-kicked: "<red>Kicked by operator:</red> <white>%reason%</white>"
  kickall-success: "<green>Kicked <white>%count%</white> players.</green>"
