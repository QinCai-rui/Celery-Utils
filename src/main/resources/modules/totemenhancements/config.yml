    SKELETON: "%player% was shot by a Skeleton but &e[Totem Of Undying]&r mended the bones"
    WITHER_SKELETON: "%player% was beaten by a Wither Skeleton but &e[Totem Of Undying]&r blocked the wither"
    SPIDER: "%player% was bitten by a Spider but &e[Totem Of Undying]&r filtered the venom"
    CAVE_SPIDER: "%player% was poisoned by a Cave Spider but &e[Totem Of Undying]&r shrugged off the venom"
    CREEPER: "%player% was blown up by a Creeper but &e[Totem Of Undying]&r held them together"
    ENDERMAN: "%player% was pummelled by an Enderman but &e[Totem Of Undying]&r kept them grounded"
    BLAZE: "%player% was scorched by a Blaze but &e[Totem Of Undying]&r absorbed the heat"
    MAGMA_CUBE: "%player% was cooked by a Magma Cube but &e[Totem Of Undying]&r shrugged off the heat"
    HOGLIN: "%player% was gored by a Hoglin but &e[Totem Of Undying]&r sealed the wound"
    ZOGLIN: "%player% was mauled by a Zoglin but &e[Totem Of Undying]&r kept them standing"
    PIGLIN: "%player% was ambushed by a Piglin but &e[Totem Of Undying]&r saved their gold"
    PIGLIN_BRUTE: "%player% was crushed by a Piglin Brute but &e[Totem Of Undying]&r took the blow"
    VINDICATOR: "%player% was chopped by a Vindicator but &e[Totem Of Undying]&r evicted the damage"
    EVOKER: "%player% was zapped by an Evoker but &e[Totem Of Undying]&r dodged the fangs"
    VEX: "%player% was slashed by a Vex but &e[Totem Of Undying]&r refused to give up the ghost"
    RAVAGER: "%player% was trampled by a Ravager but &e[Totem Of Undying]&r got them back up"
    WARDEN: "%player% was obliterated by a Warden but &e[Totem Of Undying]&r brought them back"
    WITCH: "%player% was hexed by a Witch but &e[Totem Of Undying]&r broke the spell"
    IRON_GOLEM: "%player% was pummelled by an Iron Golem but &e[Totem Of Undying]&r stood them back up"
    GUARDIAN: "%player% was zapped by a Guardian but &e[Totem Of Undying]&r grounded the current"
    ELDER_GUARDIAN: "%player% was blasted by an Elder Guardian but &e[Totem Of Undying]&r lifted the curse"
    SHULKER: "%player% was shot by a Shulker but &e[Totem Of Undying]&r opened them back up"
    PILLAGER: "%player% was shot by a Pillager but &e[Totem Of Undying]&r saved them from the raid"
    STRAY: "%player% was shot by a Stray but &e[Totem Of Undying]&r thawed the frostbite"
    PHANTOM: "%player% was swooped by a Phantom but &e[Totem Of Undying]&r banished the nightmares"
    SLIME: "%player% was bounced by a Slime but &e[Totem Of Undying]&r kept them intact"
    GHAST: "%player% was fireballed by a Ghast but &e[Totem Of Undying]&r absorbed the blast"
    SILVERFISH: "%player% was nibbled by a Silverfish but &e[Totem Of Undying]&r stopped the infestation"
    ENDERMITE: "%player% was swarmed by an Endermite but &e[Totem Of Undying]&r shook them off"
    ZOMBIE_VILLAGER: "%player% was infected by a Zombie Villager but &e[Totem Of Undying]&r cured them"
    WOLF: "%player% was mauled by a Wolf but &e[Totem Of Undying]&r patched the bite"
    POLAR_BEAR: "%player% was swiped by a Polar Bear but &e[Totem Of Undying]&r woke them back up"
    PANDA: "%player% was slapped by a Panda but &e[Totem Of Undying]&r sat them back up"
    GOAT: "%player% was rammed by a Goat but &e[Totem Of Undying]&r got them back on their feet"
    LLAMA: "%player% was spit on by a Llama but &e[Totem Of Undying]&r ignored the insult"
    TRADER_LLAMA: "%player% was spit on by a Trader Llama but &e[Totem Of Undying]&r ignored the insult"
    PUFFERFISH: "%player% was poisoned by a Pufferfish but &e[Totem Of Undying]&r deflated the damage"
    GLOW_SQUID: "%player% was inked by a Glow Squid but &e[Totem Of Undying]&r washed it off"
