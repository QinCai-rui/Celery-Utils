# TotemEnhancements — Config
# Enhances totem of undying behavior with inventory activation and death broadcasts.

# NOTE: BUMP VERSION WHEN MAKING CHANGES TO THIS FILE
# SERVER ADMIN: do not touch
config-version: 10

# Required permission to use totem enhancements (leave empty to not require a permission)
permission-node: "celeryutils.totem"

# When enabled, totems of undying anywhere in the player's inventory
# (not in hand/offhand) will automatically activate on death.
inventory-totem:
  # Whether totems inside of inventory should activate
  enabled: true
  # Whether to broadcast a death message for inventory totem activations
  broadcast: true
  # Message sent privately to the player on activation
  activation-message:
    enabled: false
    text: "&aA Totem of Undying in your inventory saved your life!"
  # Whether to play the vanilla totem resurrect effect
  play-effect: true

# When enabled, vanilla totem activations (main hand or offhand) will also
# broadcast a death message using the templates below.
hand-totem:
  broadcast: true

# Death broadcast message templates. Supports & color codes and %player%.
# These are used by both inventory-totem and hand-totem broadcasts.
broadcast-messages:
  default: "%player% died but came back to life thanks to &e[Totem Of Undying]&r"

  causes:
    CONTACT: "%player% was pricked to death but &e[Totem Of Undying]&r pulled out the thorns"
    SWEET_BERRY_BUSH: "%player% was scratched to death by a sweet berry bush but &e[Totem Of Undying]&r soothed the sting"
    FIREWORK_EXPLOSION: "%player% was blown up by fireworks but &e[Totem Of Undying]&r patched them back together"
    ENTITY_EXPLOSION: "%player% was blown up but &e[Totem Of Undying]&r held them together"
    BLOCK_EXPLOSION: "%player% was blown up but &e[Totem Of Undying]&r held them together"
    INTENTIONAL_GAME_DESIGN: "%player% was killed by [Intentional Game Design] but &e[Totem Of Undying]&r saved them anyway"
    SUFFOCATION: "%player% suffocated in a wall but &e[Totem Of Undying]&r gave them air"
    FALLING_BLOCK: "%player% was crushed by a falling block but &e[Totem Of Undying]&r took the weight"
    FALLING_ANVIL: "%player% was crushed by a falling anvil but &e[Totem Of Undying]&r cushioned the blow"
    FALLING_STALACTITE: "%player% was impaled by a falling stalactite but &e[Totem Of Undying]&r sealed the wound"
    ENTITY_ATTACK: "%player% was pummeled but &e[Totem Of Undying]&r took the hits"
    ENTITY_SWEEP_ATTACK: "%player% was pummeled but &e[Totem Of Undying]&r took the hits"
    BEE_STING: "%player% was stung to death but &e[Totem Of Undying]&r neutralized the venom"
    THORNS: "%player% died to thorns but &e[Totem Of Undying]&r broke the curse"
    FLY_INTO_WALL: "%player% experienced kinetic energy but it was converted back to potential energy by &e[Totem Of Undying]&r"
    FREEZE: "%player% froze to death but &e[Totem Of Undying]&r warmed them up"
    WITHER: "%player% withered away but &e[Totem Of Undying]&r restored them"
    HOT_FLOOR: "%player% walked on hot floor but &e[Totem Of Undying]&r cooled them down"
    CRAMMING: "%player% was crushed by the crowd but &e[Totem Of Undying]&r made space"
    DROWNING: "%player% drowned but &e[Totem Of Undying]&r let them breathe"
    VOID: "%player% didn't want to live in this world but &e[Totem Of Undying]&r pulled them back"
    STARVATION: "%player% starved to death but &e[Totem Of Undying]&r provided sustenance"
    LAVA: "%player% swam in lava but &e[Totem Of Undying]&r kept them cool"
    LAVA_BOUNCE: "%player% landed on the floor being magma but &e[Totem Of Undying]&r broke the fall"
    FIRE: "%player% was burned to death but &e[Totem Of Undying]&r extinguished the flames"
    FIRE_TICK: "%player% went up in flames but &e[Totem Of Undying]&r put out the fire"
    LIGHTNING: "%player% was struck by lightning but &e[Totem Of Undying]&r grounded it"
    SONIC_BOOM: "%player% was obliterated by a sonically-charged shriek but &e[Totem Of Undying]&r reconstructed them"
    MAGIC: "%player% was killed by magic but &e[Totem Of Undying]&r nullified it"
    DRAGON_BREATH: "%player% was killed by dragon breath but &e[Totem Of Undying]&r nullified the magic"
    FALL: "%player% fell from a high place but &e[Totem Of Undying]&r broke their fall"
    FALLING_ON_STALAGMITE: "%player% was impaled on a stalagmite but &e[Totem Of Undying]&r pulled them off"
    ENDER_PEARL: "%player% hit the ground too hard but &e[Totem Of Undying]&r softened the landing"
    PROJECTILE: "%player% was shot to death but &e[Totem Of Undying]&r closed the wounds"
    MACE_SMASH: "%player% was smashed by a mace but &e[Totem Of Undying]&r held them together"
    TRIDENT_SPEAR: "%player% was speared but &e[Totem Of Undying]&r mended the puncture"
    CUSTOM: "%player% died to unknown causes but &e[Totem Of Undying]&r brought them back"
    DRY_OUT: "%player% dried out but &e[Totem Of Undying]&r rehydrated them"
    POISON: "%player% was poisoned but &e[Totem Of Undying]&r purified their blood"
    SUICIDE: "%player% took their own life but &e[Totem Of Undying]&r refused to let them go"
    WORLD_BORDER: "%player% walked beyond the edge of the world but &e[Totem Of Undying]&r pulled them back"
    MELTING: "%player% melted away but &e[Totem Of Undying]&r solidified them"

  # Per-entity death messages for entity attacks. Supports %player% and %entity%.
