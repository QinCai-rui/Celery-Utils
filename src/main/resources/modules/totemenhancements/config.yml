# When enabled, totems used in the void (y < -64) will grant Levitation V to
# float the player back up.
void-totem:
  enabled: true

  # Which totem sources trigger the void mechanic. this is seperately configured from the main triggers
  hand: true
  inventory: true

  # The Y-level below which void mechanic activates
  trigger-y: -64
  # Duration of levitation in seconds
  duration: 60

  # Whether to broadcast a death message for void totem activations
  broadcast: true
  # Broadcast message template for void totem deaths. Supports & color codes and %player%.
  # If empty, falls back to the VOID cause template in broadcast-messages.causes.
  broadcast-message: "&c%player% fell into the void but &e[Totem Of Undying]&r pulled them back"

  # Private message sent to the player when a totem activates from void damage
  activation-message:
    enabled: false
    text: "&cYou fell into the void but &e[Totem Of Undying]&r pulled you back"
