# TotemEnhancements — Config
# Enhances totem of undying behavior with inventory activation and death broadcasts.

# NOTE: BUMP VERSION WHEN MAKING CHANGES TO THIS FILE
# SERVER ADMIN: do not touch
config-version: 1.2

# Required permission to use totem enhancements (leave empty to not require a permission)
permission-node: "celeryutils.totem"

# When enabled, totems of undying anywhere in the player's inventory
# (not in hand/offhand) will automatically activate on death.
inventory-totem:
  # Whether totems inside of inventory should activate
  enabled: true
  # Whether to broadcast a death message for inventory totem activations
  broadcast: true
  # Message sent privately to the player on activation
  activation-message:
    enabled: true
    text: "&aA Totem of Undying in your inventory saved your life!"
  # Whether to play the vanilla totem resurrect effect
  play-effect: true

# When enabled, vanilla totem activations (main hand or offhand) will also
# broadcast a death message using the templates below.
hand-totem:
  broadcast: true

# Death broadcast message templates. Supports & color codes and %player%.
# These are used by both inventory-totem and hand-totem broadcasts.
broadcast-messages:
  default: "%player% died but came back to life thanks to &e[Totem Of Undying]&r"

  causes:
    CONTACT: "%player% was pricked to death but decided to stop being poked"
    SWEET_BERRY_BUSH: "%player% got poked to death by a sweet berry bush but got the thorns off"
    FIREWORK_EXPLOSION: "%player% went out with a bang but continued with the show"
    ENTITY_EXPLOSION: "%player% blew up but stayed intact"
    BLOCK_EXPLOSION: "%player% blew up but stayed intact"
    INTENTIONAL_GAME_DESIGN: "%player% was killed by [Intentional Game Design] but survived unintentionally"
    SUFFOCATION: "%player% suffocated in a wall but got out"
    FALLING_BLOCK: "%player% was squashed by a falling block but unflattened"
    FALLING_ANVIL: "%player% was squashed by a falling anvil but got unsquished"
    FALLING_STALACTITE: "%player% was skewered by a falling stalactite but was unskewered"
    ENTITY_ATTACK: "%player% was pummeled but came out fine"
    ENTITY_SWEEP_ATTACK: "%player% was pummeled but came out fine"
    BEE_STING: "%player% was stung to death but it didn't pinch"
    THORNS: "%player% died to thorns but came back to life"
    FLY_INTO_WALL: "%player% experienced kinetic energy but it was converted back to potential energy"
    FREEZE: "%player% froze to death but kept themselves warm"
    WITHER: "%player% withered away but didn't wither"
    HOT_FLOOR: "%player% discovered the floor was lava but didn't care"
    CRAMMING: "%player% was squished too much but hung in there"
    DROWNING: "%player% drowned but swam further"
    VOID: "%player% left the confines of this world but was brought back"
    STARVATION: "%player% starved to death but ate a totem of undying"
    LAVA: "%player% swam in lava with the help of a totem of undying"
    LAVA_BOUNCE: "%player% died because not just the floor is lava but bounced back"
    FIRE: "%player% was burnt to death but cooled down"
    FIRE_TICK: "%player% went up in flames but cooled down"
    LIGHTNING: "%player% was struck by lightning but absorbed it"
    SONIC_BOOM: "%player% was obliterated by a sonically-charged shriek but got reconstructed"
    MAGIC: "%player% was killed by magic but the magic was nullified"
    DRAGON_BREATH: "%player% was killed by magic but the magic was nullified"
    FALL: "%player% fell from a high place but landed safely"
    FALLING_ON_STALAGMITE: "%player% was impaled on a stalagmite but un-impaled"
    ENDER_PEARL: "%player% hit the ground too hard but got back up"
    PROJECTILE: "%player% was shot to death but came back to life"
    MACE_SMASH: "%player% was smashed by a mace but got the weight off"
    TRIDENT_SPEAR: "%player% was speared but felt nothing"
