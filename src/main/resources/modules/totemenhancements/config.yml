# TotemEnhancements — Config
# Enhances totem of undying behavior with inventory activation and death broadcasts.

# NOTE: BUMP VERSION WHEN MAKING CHANGES TO THIS FILE
# SERVER ADMIN: do not touch
config-version: 4

# Required permission to use totem enhancements (leave empty to not require a permission)
permission-node: "celeryutils.totem"

# When enabled, totems of undying anywhere in the player's inventory
# (not in hand/offhand) will automatically activate on death.
inventory-totem:
  # Whether totems inside of inventory should activate
  enabled: true
  # Whether to broadcast a death message for inventory totem activations
  broadcast: true
  # Message sent privately to the player on activation
  activation-message:
    enabled: true
    text: "&aA Totem of Undying in your inventory saved your life!"
  # Whether to play the vanilla totem resurrect effect
  play-effect: true

# When enabled, vanilla totem activations (main hand or offhand) will also
# broadcast a death message using the templates below.
hand-totem:
  broadcast: true

# Death broadcast message templates. Supports & color codes and %player%.
# These are used by both inventory-totem and hand-totem broadcasts.
broadcast-messages:
  default: "%player% died but came back to life thanks to &e[Totem Of Undying]&r"

  causes:
    CONTACT: "%player% was pricked to death but decided to stop being poked &e[Totem Of Undying]&r"
    SWEET_BERRY_BUSH: "%player% got poked to death by a sweet berry bush but got the thorns off &e[Totem Of Undying]&r"
    FIREWORK_EXPLOSION: "%player% went out with a bang but continued with the show &e[Totem Of Undying]&r"
    ENTITY_EXPLOSION: "%player% blew up but stayed intact &e[Totem Of Undying]&r"
    BLOCK_EXPLOSION: "%player% blew up but stayed intact &e[Totem Of Undying]&r"
    INTENTIONAL_GAME_DESIGN: "%player% was killed by [Intentional Game Design] but survived unintentionally &e[Totem Of Undying]&r"
    SUFFOCATION: "%player% suffocated in a wall but got out &e[Totem Of Undying]&r"
    FALLING_BLOCK: "%player% was squashed by a falling block but unflattened &e[Totem Of Undying]&r"
    FALLING_ANVIL: "%player% was squashed by a falling anvil but got unsquished &e[Totem Of Undying]&r"
    FALLING_STALACTITE: "%player% was skewered by a falling stalactite but was unskewered &e[Totem Of Undying]&r"
    ENTITY_ATTACK: "%player% was pummeled but came out fine &e[Totem Of Undying]&r"
    ENTITY_SWEEP_ATTACK: "%player% was pummeled but came out fine &e[Totem Of Undying]&r"
    BEE_STING: "%player% was stung to death but it didn't pinch &e[Totem Of Undying]&r"
    THORNS: "%player% died to thorns but came back to life &e[Totem Of Undying]&r"
    FLY_INTO_WALL: "%player% experienced kinetic energy but it was converted back to potential energy &e[Totem Of Undying]&r"
    FREEZE: "%player% froze to death but kept themselves warm &e[Totem Of Undying]&r"
    WITHER: "%player% withered away but didn't wither &e[Totem Of Undying]&r"
    HOT_FLOOR: "%player% discovered the floor was lava but didn't care &e[Totem Of Undying]&r"
    CRAMMING: "%player% was squished too much but hung in there &e[Totem Of Undying]&r"
    DROWNING: "%player% drowned but swam further &e[Totem Of Undying]&r"
    VOID: "%player% left the confines of this world but was brought back &e[Totem Of Undying]&r"
    STARVATION: "%player% starved to death but ate a totem of undying &e[Totem Of Undying]&r"
    LAVA: "%player% swam in lava with the help of a totem of undying &e[Totem Of Undying]&r"
    LAVA_BOUNCE: "%player% died because not just the floor is lava but bounced back &e[Totem Of Undying]&r"
    FIRE: "%player% was burnt to death but cooled down &e[Totem Of Undying]&r"
    FIRE_TICK: "%player% went up in flames but cooled down &e[Totem Of Undying]&r"
    LIGHTNING: "%player% was struck by lightning but absorbed it &e[Totem Of Undying]&r"
    SONIC_BOOM: "%player% was obliterated by a sonically-charged shriek but got reconstructed &e[Totem Of Undying]&r"
    MAGIC: "%player% was killed by magic but the magic was nullified &e[Totem Of Undying]&r"
    DRAGON_BREATH: "%player% was killed by magic but the magic was nullified &e[Totem Of Undying]&r"
    FALL: "%player% fell from a high place but landed safely &e[Totem Of Undying]&r"
    FALLING_ON_STALAGMITE: "%player% was impaled on a stalagmite but un-impaled &e[Totem Of Undying]&r"
    ENDER_PEARL: "%player% hit the ground too hard but got back up &e[Totem Of Undying]&r"
    PROJECTILE: "%player% was shot to death but came back to life &e[Totem Of Undying]&r"
    MACE_SMASH: "%player% was smashed by a mace but got the weight off &e[Totem Of Undying]&r"
    TRIDENT_SPEAR: "%player% was speared but felt nothing &e[Totem Of Undying]&r"
