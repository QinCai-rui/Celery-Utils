# Inventory Totem Module Config
# Allows players to use a Totem of Undying from anywhere in their inventory.

# Required permission to use this feature (leave empty to not require a permission)
permission-node: "celeryutils.totem"

# Send a message to the player when their totem activates from the inventory?
send-activation-message: true

# The message to send to the player. Supports color codes (&).
activation-message: "&aA Totem of Undying in your inventory saved your life!"

# Whether to force play the vanilla totem resurrect effect.
play-totem-effect: true

# Broadcast a death-like message when a totem saves a player from an inventory slot
broadcast-messages:
  enabled: true
  
  # The default message to broadcast if the specific cause is not found
  default: "%player% died but came back to life thanks to &e[Totem Of Undying]&r in their &linventory"
  
  # Specific messages based on the damage cause. Use placeholders %player%.
  causes:
    # Contact with berry bushes, cactus, berries, or similar block contact damage.
    CONTACT: "%player% was pricked to death but decided to stop being poked thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from sweet berry bushes.
    SWEET_BERRY_BUSH: "%player% got poked to death by a sweet berry bush but got the thorns off thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from fireworks exploding near the player.
    FIREWORK_EXPLOSION: "%player% went out with a bang but continued with the show thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from an entity explosion, such as creepers or TNT.
    ENTITY_EXPLOSION: "%player% blew up but stayed intact thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from a block explosion, such as beds or respawn anchors.
    BLOCK_EXPLOSION: "%player% blew up but stayed intact thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from intentional game design hazards like beds or respawn anchors in the wrong dimension.
    INTENTIONAL_GAME_DESIGN: "%player% was killed by [Intentional Game Design] but survived unintentionally thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from suffocation inside blocks.
    SUFFOCATION: "%player% suffocated in a wall but got out thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from a falling block.
    FALLING_BLOCK: "%player% was squashed by a falling block but unflattened thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from a falling anvil.
    FALLING_ANVIL: "%player% was squashed by a falling anvil but got unsquished thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from falling pointed dripstone.
    FALLING_STALACTITE: "%player% was skewered by a falling stalactite but was unskewered thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from melee attacks by entities or players.
    ENTITY_ATTACK: "%player% was pummeled but came out fine thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from sweeping attacks.
    ENTITY_SWEEP_ATTACK: "%player% was pummeled but came out fine thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from bee stings.
    BEE_STING: "%player% was stung to death but it didn't pinch thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from thorns enchantment.
    THORNS: "%player% died to thorns but came back to life thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from flying into a wall.
    FLY_INTO_WALL: "%player% experienced kinetic energy but it was converted back to potential energy thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from freezing.
    FREEZE: "%player% froze to death but kept themselves warm using &e[Totem Of Undying]&r in their &linventory"
    # Damage from wither effect.
    WITHER: "%player% withered away but didn't wither thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from hot floor blocks like magma or campfires.
    HOT_FLOOR: "%player% discovered the floor was lava but didn't care because of &e[Totem Of Undying]&r in their &linventory"
    # Damage from entity cramming.
    CRAMMING: "%player% was squished too much but hung in there thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from drowning.
    DROWNING: "%player% drowned but swam further thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from falling into the void.
    VOID: "%player% left the confines of this world but was brought back into the world thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from starvation.
    STARVATION: "%player% starved to death but ate &e[Totem Of Undying]&r in their &linventory"
    # Damage from lava.
    LAVA: "%player% swam in lava with the help of &e[Totem Of Undying]&r in their &linventory"
    # Damage from lava bounce effects.
    LAVA_BOUNCE: "%player% died because not just the floor is lava but bounced back thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from fire.
    FIRE: "%player% was burnt to death but cooled down thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from fire tick.
    FIRE_TICK: "%player% went up in flames but cooled down thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from lightning.
    LIGHTNING: "%player% was struck by lightning but absorbed it thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from the warden's sonic boom.
    SONIC_BOOM: "%player% was obliterated by a sonically-charged shriek but got reconstructed thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from magic-based attacks.
    MAGIC: "%player% was killed by magic but the magic was nullified thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from dragon breath.
    DRAGON_BREATH: "%player% was killed by magic but the magic was nullified thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from falling from a height.
    FALL: "%player% fell from a high place but landed safely thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from falling onto pointed dripstone.
    FALLING_ON_STALAGMITE: "%player% was impaled on a stalagmite but un-impaled thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from projectiles like arrows or tridents.
    ENDER_PEARL: "%player% hit the ground too hard but got back up thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from projectiles like arrows or tridents.
    PROJECTILE: "%player% was shot to death but came back to life thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from a mace smash.
    MACE_SMASH: "%player% was smashed by a mace but got the weight off thanks to &e[Totem Of Undying]&r in their &linventory"
    # Damage from a trident spear hit.
    TRIDENT_SPEAR: "%player% was speared but felt nothing thanks to &e[Totem Of Undying]&r in their &linventory"
