# Economy Permissions module defaults
config-version: 1.0
# Define permission rules by key
rules:
  slash-echest:
    # Minimum balance required for the user to be eligible for this permission
    min-balance: 1000.0
    # The permission node to grant the user
    permission: "essentials.enderchest"
    # OPTIONAL: Contexts for the permission (supported by some permission plugins like LuckPerms via Vault)
    # If not specified, it uses global context.
    # server: "proxy"
    # world: "world"
    # Whether to automatically grant this permission for free when balance >= min-balance.
    # Note: If auto-granted for free, it may be revoked if balance drops (see below).
    auto-grant: false
    # Whether to remove the permission if the user's balance falls below min-balance.
    # IMPORTANT: This ONLY applies to auto-granted permissions. 
    # If a player manually BUYS a permission, it will NEVER be revoked by balance checks.
    revoke-on-balance-below: false
    # Whether the permission can be purchased via a command
    buyable: true
    # The cost to purchase this permission (deducts from player balance).
    # Once purchased, the player keeps the permission even if their balance drops to zero.
    price: 1000.0
    # Description shown to players in the /celeryutils ecoperm list command
    description: "Access to the virtual enderchest command /echest"
    # duration-seconds: 0 for permanent, >0 for temporary
    duration-seconds: 0
  mending-shift-right-click:
    min-balance: 2500.0
    permission: "purpur.mending_shift_click"
    auto-grant: false
    revoke-on-balance-below: true
    buyable: true
    price: 2500.0
    duration-seconds: 0
  echest-6rows:
    min-balance: 10000.0
    permission: "purpur.enderchest.rows.6"
    auto-grant: false
    revoke-on-balance-below: true
    buyable: true
    price: 10000.0
    duration-seconds: 0
