# Economy Permissions module defaults
# Define permission rules by key
rules:
  vip-tier:
    min-balance: 100.0
    permission: "celeryutils.vip"
    revoke-on-balance-below: true
    buyable: true
    price: 100.0
    # duration-seconds: 0 for permanent, >0 for temporary
    duration-seconds: 0
  premium-tier:
    min-balance: 500.0
    permission: "celeryutils.premium"
    revoke-on-balance-below: true
    buyable: true
    price: 500.0
    duration-seconds: 0
  elite-tier:
    min-balance: 1000.0
    permission: "celeryutils.elite"
    revoke-on-balance-below: true
    buyable: true
    price: 1000.0
    duration-seconds: 0
