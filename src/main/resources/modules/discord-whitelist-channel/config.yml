# Discord Whitelist Channel module configuration

# NOTE: BUMP VERSION WHEN MAKING CHANGES TO THIS FILE
# SERVER ADMIN: do not touch
config-version: 2

# Discord bot token for the whitelist bot
bot-token: "YOUR_DISCORD_BOT_TOKEN_HERE"

# Discord channel ID where the bot will listen for whitelist requests
channel-id: 0

# Maximum number of players a single Discord user can whitelist (default: 1)
max-players-per-user: 1

# UUID type to whitelist.
# AUTO = Let the server decide based on its online-mode setting
# OFFLINE = Force offline/cracked UUID
# ONLINE = Force Mojang/premium UUID
# BOTH = Whitelist both offline and online UUIDs
uuid-type: "AUTO"

# Role requirement configuration
role-requirement:
  # Set to true if only users with a specific role can use this feature
  enabled: false
  # Discord role ID (set enabled to true to use this)
  role-id: ""
