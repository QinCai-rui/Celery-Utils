name: CeleryUtils
version: ${project.version}
main: xyz.qincai.celeryutils.CeleryUtils
description: ${project.description}
authors:
  - QinCai-rui
website: https://github.com/QinCai-rui/Celery-Utils

api-version: 1.20

softdepend:
  - Vault

commands:
  celeryutils:
    description: Main command for CeleryUtils
    usage: /celeryutils <subcommand>
    aliases: [cu]
  pvp:
    description: Toggle PvP loadout or manage gear
    usage: /pvp <toggle|gear>
    permission: celeryutils.pvp
  afk:
    description: Toggle AFK status
    usage: /afk
    permission: celeryutils.afk
  killall:
    description: Remove entities by category or type
    usage: /killall <selector|entity_type> [world]
    permission: celeryutils.killall
    commands:
  gm:
    description: Quick gamemode switch
    usage: /gm <mode>

permissions:
  celeryutils.pvp:
    description: Allow starting a PvP session
    default: op
  celeryutils.admin:
    description: Admin access to CeleryUtils
    default: op
  celeryutils.discordlink:
    description: Permission for Discord Link module
    default: op
  celeryutils.economy:
    description: Permission for Economy Permissions module
    default: op
  celeryutils.afk:
    description: Permission to use AFK command
    default: true
  celeryutils.afk.bypass:
    description: Exempt player from AFK auto-kick
    default: op
  celeryutils.killall:
    description: Permission to run /killall
    default: op
