# CeleryUtils Configuration
# Global settings and module enable flags

# NOTE: BUMP VERSION WHEN MAKING CHANGES TO THIS FILE
# SERVER ADMIN: do not touch
config-version: 1.7

global:
  debug: false

# Database configuration used across all supported modules
database:
  # SQLITE or MYSQL
  type: SQLITE
  host: "localhost"
  port: 3306
  database: "celeryutils"
  username: "root"
  password: ""
  use-ssl: false
  pool-size: 10

update-checker:
  enabled: true
  auto-download: true
  notify-on-join: true
  notify-permission: "celeryutils.update"
  notify-ops-without-permission: true
  interval-minutes: 60
  api-url: "https://api.github.com/repos/QinCai-rui/Celery-Utils/releases/latest"
  timeout-millis: 10000

# Enable/disable modules here. Module-specific config files live under /modules/<module>/config.yml
modules:
  discord-link:
    enabled: false
  discord-whitelist-channel:
    enabled: false
  economy-permissions:
    enabled: false
  death-penalty:
    enabled: false
  essentials:
    enabled: false
  pvp-module:
    enabled: false
  totemenhancements:
    enabled: false
